<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創思英文小學堂</title>
    
    <!-- 引入 Tailwind CSS 框架作版面設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 引入 Babel 來解析 React 語法 (JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .word-wrap-break { word-break: break-word; hyphens: auto; }
        
        /* 簡單的淡入動畫 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="h-screen w-full bg-[#FAF7F2] font-sans selection:bg-[#D4A373] selection:text-white overflow-hidden flex justify-center bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')]">
    
    <!-- React 應用程式掛載點 -->
    <div id="root" class="w-full h-full max-w-2xl bg-[#FDFBF7]/90 backdrop-blur-sm shadow-2xl overflow-y-auto"></div>

    <!-- React 程式碼開始 -->
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- 圖示元件 (取代原本的 lucide-react，確保離線與單檔可用) ---
        const Volume2 = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
        const ArrowRight = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        const ArrowLeft = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const Home = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const Check = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const X = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const Award = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;
        const BookOpen = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const Gamepad2 = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><path d="M2 12a10 10 0 0 1 10-10h0a10 10 0 0 1 10 10v0a10 10 0 0 1-10 10h0a10 10 0 0 1-10-10v0z"></path></svg>;


        // --- 資料區 Data ---
        const appData = {
          phonics: [
            { en: "kit", zh: "工具箱" }, { en: "kite", zh: "風箏" },
            { en: "Tim", zh: "（男子名）" }, { en: "time", zh: "時間" },
            { en: "wig", zh: "假髮" }, { en: "five", zh: "五" },
            { en: "pipe", zh: "水管" }, { en: "ride", zh: "騎、乘" },
            { en: "not", zh: "不" }, { en: "note", zh: "筆記；便條" },
            { en: "cod", zh: "鱈魚" }, { en: "code", zh: "條碼；密碼" },
            { en: "hop", zh: "（單腳）跳" }, { en: "cone", zh: "圓錐" },
            { en: "robe", zh: "睡袍" }, { en: "hope", zh: "希望" },
            { en: "cut", zh: "切；剪" }, { en: "cute", zh: "可愛的" },
            { en: "tub", zh: "浴缸" }, { en: "tube", zh: "試管；管子" },
            { en: "duck", zh: "鴨子" }, { en: "cube", zh: "正方體" },
            { en: "dune", zh: "沙丘" }, { en: "mute", zh: "無聲的" }
          ],
          words: [
            { en: "eleven", zh: "十一" }, { en: "twelve", zh: "十二" },
            { en: "twenty", zh: "二十" }, { en: "thirty", zh: "三十" },
            { en: "forty", zh: "四十" }, { en: "fifty-five", zh: "五十五" },
            { en: "what time", zh: "幾點" }, { en: "o'clock", zh: "......點鐘" },
            { en: "cake", zh: "蛋糕" }, { en: "ice cream", zh: "冰淇淋" },
            { en: "milk", zh: "牛奶" }, { en: "juice", zh: "果汁" },
            { en: "water", zh: "水" }, { en: "pizza", zh: "披薩" },
            { en: "like", zh: "喜歡" }
          ],
          sentences: [
            { en: "What time is it?", zh: "現在幾點了？" },
            { en: "It's seven o'clock.", zh: "現在是七點鐘。" },
            { en: "It's seven thirty.", zh: "現在是七點三十分。" },
            { en: "Do you like milk?", zh: "你喜歡牛奶嗎？" },
            { en: "Yes, I do.", zh: "是的，我喜歡。" },
            { en: "No, I don't. I like juice.", zh: "不，我不喜歡。我喜歡果汁。" }
          ]
        };

        const categoryTitles = {
          phonics: "自然發音 (Phonics Fun)",
          words: "單字練習 (My Day Words)",
          sentences: "實用句子 (Sentences)"
        };

        // --- 共用 UI 元件 ---

        const WoodenButton = ({ onClick, children, className = "", primary = false, disabled = false }) => {
          const baseStyle = "relative transition-all duration-200 active:top-[4px] rounded-xl font-bold flex items-center justify-center disabled:opacity-50 disabled:active:top-0";
          const primaryStyle = "bg-[#D4A373] text-[#FEFAE0] border-b-4 border-[#A67C52] hover:bg-[#E2B488]";
          const secondaryStyle = "bg-[#FAEDCD] text-[#5C4033] border-b-4 border-[#D4A373] hover:bg-[#FEFAE0]";
          
          return (
            <button 
              onClick={onClick} 
              disabled={disabled}
              className={`${baseStyle} ${primary ? primaryStyle : secondaryStyle} ${className}`}
            >
              {children}
            </button>
          );
        };

        const Card = ({ children, className = "" }) => (
          <div className={`bg-[#FEFAE0] rounded-2xl p-6 shadow-[0_8px_0_0_#D4A373] border-2 border-[#D4A373] ${className}`}>
            {children}
          </div>
        );

        // --- 主程式 App ---

        function App() {
          const [view, setView] = useState('home'); 
          const [category, setCategory] = useState(''); 
          
          const [currentIndex, setCurrentIndex] = useState(0);
          const [isFlipped, setIsFlipped] = useState(false);
          
          const [quizQuestions, setQuizQuestions] = useState([]);
          const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
          const [score, setScore] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [isCorrect, setIsCorrect] = useState(null);
          const [isLineBrowser, setIsLineBrowser] = useState(false);

          // 判斷是否為 LINE 內建瀏覽器
          useEffect(() => {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (ua.includes("LINE") || ua.includes("Line")) {
              setIsLineBrowser(true);
            }
          }, []);

          // 解決手機版無法播放語音的問題 (透過使用者首次點擊解鎖音效權限)
          useEffect(() => {
            const unlockAudio = () => {
              if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance('');
                utterance.volume = 0; // 靜音播放一次來解鎖
                window.speechSynthesis.speak(utterance);
              }
              // 解鎖後移除監聽器，避免重複執行
              document.removeEventListener('touchstart', unlockAudio);
              document.removeEventListener('click', unlockAudio);
            };
            
            // 監聽使用者的第一次點擊或觸控
            document.addEventListener('touchstart', unlockAudio);
            document.addEventListener('click', unlockAudio);
            
            return () => {
              document.removeEventListener('touchstart', unlockAudio);
              document.removeEventListener('click', unlockAudio);
            };
          }, []);

          const playAudio = useCallback((text) => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              
              // 移除 setTimeout：LINE 內建瀏覽器對於「非同步」播放非常嚴格
              // 必須確保語音在使用者點擊的當下立刻執行，不能有任何延遲
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'en-US';
              utterance.rate = 0.85; 
              utterance.pitch = 1.1; 
              window.speechSynthesis.speak(utterance);
            }
          }, []);

          const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
          };

          const goHome = () => {
            setView('home');
            setCategory('');
            window.speechSynthesis.cancel();
          };

          const openMenu = (cat) => {
            setCategory(cat);
            setView('menu');
          };

          const startLearning = () => {
            setCurrentIndex(0);
            setIsFlipped(false);
            setView('learn');
            playAudio(appData[category][0].en);
          };

          const startQuiz = () => {
            const data = appData[category];
            const shuffledData = shuffleArray(data);
            const selectedData = shuffledData.slice(0, Math.min(10, data.length));
            
            const questions = selectedData.map(item => {
              const others = data.filter(d => d.en !== item.en);
              const wrongOptions = shuffleArray(others).slice(0, 3);
              const options = shuffleArray([item, ...wrongOptions]);
              return { target: item, options: options };
            });

            setQuizQuestions(questions);
            setCurrentQuestionIndex(0);
            setScore(0);
            setSelectedAnswer(null);
            setIsCorrect(null);
            setView('quiz');
            
            setTimeout(() => { playAudio(questions[0].target.en); }, 500);
          };

          const nextCard = () => {
            if (currentIndex < appData[category].length - 1) {
              setIsFlipped(false);
              setCurrentIndex(prev => prev + 1);
              playAudio(appData[category][currentIndex + 1].en);
            }
          };

          const prevCard = () => {
            if (currentIndex > 0) {
              setIsFlipped(false);
              setCurrentIndex(prev => prev - 1);
              playAudio(appData[category][currentIndex - 1].en);
            }
          };

          const handleAnswer = (option) => {
            if (selectedAnswer) return; 

            const correct = option.en === quizQuestions[currentQuestionIndex].target.en;
            setSelectedAnswer(option);
            setIsCorrect(correct);

            if (correct) {
              setScore(prev => prev + 1);
            }

            // 這裡的 setTimeout 是為了換題，不影響語音播放
            setTimeout(() => {
              if (currentQuestionIndex < quizQuestions.length - 1) {
                setCurrentQuestionIndex(prev => prev + 1);
                setSelectedAnswer(null);
                setIsCorrect(null);
                playAudio(quizQuestions[currentQuestionIndex + 1].target.en);
              } else {
                setView('result');
              }
            }, 1500);
          };

          const renderHome = () => (
            <div className="flex flex-col items-center justify-center h-full space-y-8 animate-fade-in p-4 relative">
              {isLineBrowser && (
                <div className="absolute top-4 left-4 right-4 bg-[#FFB4A2] text-[#5C4033] p-3 rounded-xl shadow-md text-sm font-bold text-center border-2 border-[#E5989B] z-10 animate-bounce">
                  💡 發現您正使用 LINE 瀏覽器<br/>若沒聲音，請點擊右上角「⋮」或分享圖示<br/>選擇 <span className="text-white bg-[#E5989B] px-1 rounded">用預設瀏覽器開啟</span>
                </div>
              )}
              <div className="text-center space-y-4 mb-8 mt-12">
                <h1 className="text-4xl md:text-5xl font-extrabold text-[#5C4033] tracking-wider drop-shadow-md">
                  創思英文小學堂
                </h1>
                <p className="text-[#8B5A2B] font-medium text-lg md:text-xl">
                  四年級英文特訓班
                </p>
              </div>

              <div className="w-full max-w-md space-y-4">
                <WoodenButton primary className="w-full py-4 text-xl" onClick={() => openMenu('phonics')}>
                  <span className="flex items-center gap-3">🔤 {categoryTitles.phonics}</span>
                </WoodenButton>
                <WoodenButton primary className="w-full py-4 text-xl" onClick={() => openMenu('words')}>
                  <span className="flex items-center gap-3">🍎 {categoryTitles.words}</span>
                </WoodenButton>
                <WoodenButton primary className="w-full py-4 text-xl" onClick={() => openMenu('sentences')}>
                  <span className="flex items-center gap-3">💬 {categoryTitles.sentences}</span>
                </WoodenButton>
              </div>
            </div>
          );

          const renderMenu = () => (
            <div className="flex flex-col items-center h-full max-w-md mx-auto px-4 py-8 animate-fade-in">
              <div className="w-full flex justify-between items-center mb-12 mt-4">
                <button onClick={goHome} className="p-2 rounded-full bg-[#FAEDCD] text-[#5C4033] shadow-md active:scale-95">
                  <Home size={28} />
                </button>
                <h2 className="text-xl md:text-2xl font-bold text-[#5C4033]">{categoryTitles[category]}</h2>
                <div className="w-11"></div> 
              </div>

              <div className="w-full space-y-6 mt-8">
                <WoodenButton primary className="w-full py-8 flex flex-col gap-2" onClick={startLearning}>
                  <BookOpen size={40} />
                  <span className="text-2xl">學習模式</span>
                  <span className="text-sm opacity-80 font-normal">看字卡、聽發音</span>
                </WoodenButton>

                <WoodenButton className="w-full py-8 flex flex-col gap-2" onClick={startQuiz}>
                  <Gamepad2 size={40} />
                  <span className="text-2xl">挑戰模式</span>
                  <span className="text-sm opacity-80 font-normal">聽音辨字測驗</span>
                </WoodenButton>
              </div>
            </div>
          );

          const renderLearn = () => {
            const item = appData[category][currentIndex];
            const total = appData[category].length;

            return (
              <div className="flex flex-col h-full max-w-lg mx-auto px-4 py-6 animate-fade-in">
                <div className="flex justify-between items-center mb-6 mt-4">
                  <button onClick={() => setView('menu')} className="p-2 rounded-full bg-[#FAEDCD] text-[#5C4033] shadow-md">
                    <Home size={24} />
                  </button>
                  <div className="bg-[#E9EDC9] text-[#5C4033] px-4 py-1 rounded-full font-bold shadow-sm">
                    {currentIndex + 1} / {total}
                  </div>
                </div>

                <div className="flex-1 flex flex-col items-center justify-center mb-8 perspective-1000">
                  <div 
                    className={`relative w-full aspect-[4/3] md:aspect-[3/2] cursor-pointer transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}
                    onClick={() => setIsFlipped(!isFlipped)}
                  >
                    {/* 正面：英文 */}
                    <Card className={`absolute inset-0 flex flex-col items-center justify-center backface-hidden ${isFlipped ? 'invisible' : 'visible'}`}>
                      <div className="text-5xl md:text-6xl font-bold text-[#5C4033] text-center px-4 word-wrap-break">
                        {item.en}
                      </div>
                      <p className="absolute bottom-4 text-[#A67C52] text-sm font-medium animate-pulse">點擊翻面</p>
                    </Card>

                    {/* 背面：中文 */}
                    <Card className={`absolute inset-0 flex flex-col items-center justify-center backface-hidden rotate-y-180 ${!isFlipped ? 'invisible' : 'visible'} bg-[#E9EDC9]`}>
                      <div className="text-4xl md:text-5xl font-bold text-[#5C4033] text-center px-4">
                        {item.zh}
                      </div>
                      <p className="absolute bottom-4 text-[#A67C52] text-sm font-medium">點擊翻面</p>
                    </Card>
                  </div>
                </div>

                <div className="flex justify-between items-center gap-4 mb-8">
                  <WoodenButton className="p-4" onClick={prevCard} disabled={currentIndex === 0}>
                    <ArrowLeft size={28} />
                  </WoodenButton>

                  <button 
                    onClick={() => playAudio(item.en)}
                    className="bg-[#D4A373] text-[#FEFAE0] p-6 rounded-full shadow-[0_6px_0_0_#A67C52] active:top-[4px] active:shadow-none transition-all"
                  >
                    <Volume2 size={40} />
                  </button>

                  <WoodenButton className="p-4" onClick={nextCard} disabled={currentIndex === total - 1}>
                    <ArrowRight size={28} />
                  </WoodenButton>
                </div>
              </div>
            );
          };

          const renderQuiz = () => {
            if (quizQuestions.length === 0) return null;
            
            const question = quizQuestions[currentQuestionIndex];
            const target = question.target;

            return (
              <div className="flex flex-col h-full max-w-lg mx-auto px-4 py-6 animate-fade-in">
                <div className="flex justify-between items-center mb-8 mt-4">
                  <button onClick={() => setView('menu')} className="p-2 rounded-full bg-[#FAEDCD] text-[#5C4033] shadow-md">
                    <X size={24} />
                  </button>
                  <div className="w-full max-w-[200px] bg-[#E9EDC9] rounded-full h-4 ml-4 overflow-hidden border border-[#D4A373]">
                    <div 
                      className="bg-[#8B5A2B] h-full transition-all duration-300"
                      style={{ width: `${((currentQuestionIndex) / quizQuestions.length) * 100}%` }}
                    ></div>
                  </div>
                  <span className="ml-4 font-bold text-[#5C4033]">{currentQuestionIndex + 1}/{quizQuestions.length}</span>
                </div>

                <div className="flex-1 flex flex-col items-center">
                  <h3 className="text-xl font-bold text-[#8B5A2B] mb-6">請仔細聽，選擇正確的選項</h3>
                  
                  <button 
                    onClick={() => playAudio(target.en)}
                    className={`bg-[#D4A373] text-[#FEFAE0] p-8 rounded-full shadow-[0_8px_0_0_#A67C52] active:top-[4px] active:shadow-none transition-all mb-10 ${selectedAnswer ? 'pointer-events-none opacity-80' : 'animate-bounce'}`}
                  >
                    <Volume2 size={48} />
                  </button>

                  <div className="grid grid-cols-1 gap-4 w-full">
                    {question.options.map((opt, i) => {
                      let btnClass = "py-4 text-xl md:text-2xl";
                      let isSelected = selectedAnswer?.en === opt.en;
                      let isTarget = target.en === opt.en;

                      if (selectedAnswer) {
                        if (isTarget) {
                          btnClass += " bg-[#CCD5AE] border-[#8F9779] text-[#3e2723]"; 
                        } else if (isSelected && !isCorrect) {
                          btnClass += " bg-[#E5989B] border-[#B56576] text-white"; 
                        } else {
                          btnClass += " opacity-50"; 
                        }
                      }

                      return (
                        <WoodenButton 
                          key={i} 
                          className={btnClass}
                          onClick={() => handleAnswer(opt)}
                          disabled={selectedAnswer !== null}
                        >
                          {opt.en}
                          {selectedAnswer && isTarget && <Check className="absolute right-4 text-green-700" size={24}/>}
                          {isSelected && !isCorrect && <X className="absolute right-4 text-white" size={24}/>}
                        </WoodenButton>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          };

          const renderResult = () => (
            <div className="flex flex-col items-center justify-center h-full px-4 animate-fade-in">
              <Card className="w-full max-w-sm flex flex-col items-center py-10">
                <Award size={80} className="text-[#D4A373] mb-4" />
                <h2 className="text-3xl font-bold text-[#5C4033] mb-2">測驗完成！</h2>
                <p className="text-xl text-[#8B5A2B] mb-8">
                  你的得分: <span className="text-4xl font-extrabold text-[#D4A373] ml-2">{score}</span> / {quizQuestions.length}
                </p>
                
                <div className="w-full space-y-4">
                  <WoodenButton primary className="w-full py-3" onClick={startQuiz}>
                     再玩一次
                  </WoodenButton>
                  <WoodenButton className="w-full py-3" onClick={() => setView('menu')}>
                     回目錄
                  </WoodenButton>
                </div>
              </Card>
            </div>
          );

          return (
             <React.Fragment>
                {view === 'home' && renderHome()}
                {view === 'menu' && renderMenu()}
                {view === 'learn' && renderLearn()}
                {view === 'quiz' && renderQuiz()}
                {view === 'result' && renderResult()}
             </React.Fragment>
          );
        }

        // 將 App 渲染到畫面中
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
